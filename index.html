<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIZONYX Computer Vision KeyBoard (V3.0 - Optimized)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020617;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        /* Full Screen Real-Time Camera Feed Layer */
        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirrored horizontally for user intuitive feedback */
        }

        #output-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            transform: scaleX(-1); /* Mirror canvas to align precisely with mirrored video stream */
            pointer-events: none;
        }

        /* Top Interface Matrix: Output Display Box and Telemetry Stats */
        #top-interface-panel {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 850px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        #display-buffer {
            width: 100%;
            height: 110px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 18px;
            color: #f8fafc;
            font-size: 1.4rem;
            font-weight: 500;
            line-height: 1.5;
            overflow-y: auto;
            word-wrap: break-word;
            white-space: pre-wrap;
            box-shadow: 0 12px 30px -5px rgba(0, 0, 0, 0.6);
        }

        #control-action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        #telemetry-stats {
            background: rgba(15, 23, 42, 0.8);
            padding: 8px 16px;
            border-radius: 20px;
            color: #38bdf8;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            border: 1px solid rgba(56, 189, 248, 0.25);
            backdrop-filter: blur(8px);
        }

        #btn-submit-transaction {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 20px 0 rgba(34, 197, 94, 0.35);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.02em;
        }

        #btn-submit-transaction:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px 0 rgba(34, 197, 94, 0.2);
        }

        #btn-submit-transaction:disabled {
            background: #334155;
            border-color: transparent;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* Ultra-Transparent Glassmorphism Keyboard Interface Grid Spatial Layer */
        #keyboard-matrix {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 96%;
            max-width: 1050px;
            
            /* Optimized Base Opacity to maximize Hand visibility underneath */
            background: rgba(15, 23, 42, 0.25); /* Reduced to 25% for maximum transparency */
            backdrop-filter: blur(12px);         /* Adjusted blur to maintain structural clarity */
            -webkit-backdrop-filter: blur(12px);
            
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 28px;
            padding: 22px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05),
                        0 25px 60px -15px rgba(0, 0, 0, 0.85);
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            width: 100%;
            gap: 12px;
        }

        .key-cell {
            flex: 1;
            height: 58px;
            max-width: 85px;
            background: rgba(255, 255, 255, 0.03); /* Fainter layout background */
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(241, 245, 249, 0.75);
            font-size: 1.3rem;
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        /* Key Sizing Variance Schema */
        .key-cell.key-wide {
            flex: 1.8;
            max-width: 150px;
            background: rgba(239, 68, 68, 0.06);
            border-color: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .key-cell.key-space {
            flex: 5;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Premium Cyberpunk Hover and Interactive Activation Matrices */
        .key-cell.spatial-hover {
            background: rgba(14, 165, 233, 0.25) !important;
            border-color: #0ea5e9;
            color: #ffffff;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.4),
                        0 0 15px rgba(14, 165, 233, 0.2);
        }

        .key-cell.spatial-hover::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
            width: var(--hover-progress, 0%);
            transition: width 0.05s linear;
        }

        .key-cell.spatial-commit {
            background: #0ea5e9 !important;
            color: #0f172a !important;
            transform: translateY(1px) scale(0.96);
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.4),
                        0 0 30px rgba(14, 165, 233, 0.6);
        }

        /* Notification Toast Styling Parameters */
        #toast-notification {
            position: absolute;
            top: 175px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #22c55e;
            color: #f8fafc;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.5);
        }

        #toast-notification.active {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #toast-notification.error-toast {
            border-color: #ef4444;
            color: #fca5a5;
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output-canvas"></canvas>
    </div>

    <div id="top-interface-panel">
        <div id="display-buffer">ప్రస్తుతం టైప్ చేసిన అక్షరాలు ఇక్కడ కనిపిస్తాయి...</div>
        
        <div id="control-action-row">
            <div id="telemetry-stats">SYSTEM: ENGAGING COMPUTER VISION...</div>
            <button id="btn-submit-transaction">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                SUBMIT DATA
            </button>
        </div>
    </div>

    <div id="keyboard-matrix">
        <div class="keyboard-row">
            <div class="key-cell" data-key="Q">Q</div>
            <div class="key-cell" data-key="W">W</div>
            <div class="key-cell" data-key="E">E</div>
            <div class="key-cell" data-key="R">R</div>
            <div class="key-cell" data-key="T">T</div>
            <div class="key-cell" data-key="Y">Y</div>
            <div class="key-cell" data-key="U">U</div>
            <div class="key-cell" data-key="I">I</div>
            <div class="key-cell" data-key="O">O</div>
            <div class="key-cell" data-key="P">P</div>
        </div>
        <div class="keyboard-row">
            <div class="key-cell" data-key="A">A</div>
            <div class="key-cell" data-key="S">S</div>
            <div class="key-cell" data-key="D">D</div>
            <div class="key-cell" data-key="F">F</div>
            <div class="key-cell" data-key="G">G</div>
            <div class="key-cell" data-key="H">H</div>
            <div class="key-cell" data-key="J">J</div>
            <div class="key-cell" data-key="K">K</div>
            <div class="key-cell" data-key="L">L</div>
        </div>
        <div class="keyboard-row">
            <div class="key-cell" data-key="Z">Z</div>
            <div class="key-cell" data-key="X">X</div>
            <div class="key-cell" data-key="C">C</div>
            <div class="key-cell" data-key="V">V</div>
            <div class="key-cell" data-key="B">B</div>
            <div class="key-cell" data-key="N">N</div>
            <div class="key-cell" data-key="M">M</div>
            <div class="key-cell key-wide" data-key="BACKSPACE">Back</div>
        </div>
        <div class="keyboard-row">
            <div class="key-cell key-wide" data-key="CLEAR">Clear All</div>
            <div class="key-cell key-space" data-key=" ">Space Bar</div>
        </div>
    </div>

    <div id="toast-notification">Notification System Initialized</div>

    <script>
        // Production Endpoint Connection Target URL Parameter
        const SECURE_APPS_SCRIPT_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyy3JtkSQKNZb8POZtwiJJl19UmJD2CoN_pl3YR9ZPNKa_uYWdlE39JN5khWt3qO204KQ/exec";

        // Global DOM Elements References
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const displayBuffer = document.getElementById('display-buffer');
        const telemetryStats = document.getElementById('telemetry-stats');
        const submitButton = document.getElementById('btn-submit-transaction');
        const toastNotification = document.getElementById('toast-notification');

        // Application Control Engine Parameters
        let activeStringStream = "";
        let isBufferDefaultState = true;
        let currentTargetKeyElement = null;
        let spatialHoverStartTime = 0;
        const GESTURE_DWELL_THRESHOLD_MS = 1200; // Optimal execution time delay metric
        let systemCoolDownLockActive = false;

        // Synchronize viewport spatial resolution scaling matrices
        function synchronizeCanvasSpatialDimensions() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', synchronizeCanvasSpatialDimensions);
        synchronizeCanvasSpatialDimensions();

        // Real-time Toast Engine UI Notice Handler
        function renderApplicationToast(message, isErrorState = false) {
            toastNotification.textContent = message;
            if (isErrorState) {
                toastNotification.classList.add('error-toast');
            } else {
                toastNotification.classList.remove('error-toast');
            }
            toastNotification.classList.add('active');
            setTimeout(() => {
                toastNotification.classList.remove('active');
            }, 3500);
        }

        // Output Buffer Modulation Stream Pipeline Layer
        function updateDisplayBufferUI(characterToken) {
            if (isBufferDefaultState) {
                activeStringStream = "";
                isBufferDefaultState = false;
            }

            if (characterToken === "BACKSPACE") {
                activeStringStream = activeStringStream.slice(0, -1);
            } else if (characterToken === "CLEAR") {
                activeStringStream = "";
            } else {
                activeStringStream += characterToken;
            }

            if (activeStringStream === "") {
                displayBuffer.textContent = "ప్రస్తుతుం టైప్ చేసిన అక్షరాలు ఇక్కడ కనిపిస్తాయి...";
                isBufferDefaultState = true;
            } else {
                displayBuffer.textContent = activeStringStream;
            }
            displayBuffer.scrollTop = displayBuffer.scrollHeight;
        }

        // Low-latency Spatial Intersection Bound Tracking Engine
        function identifySpatialKeyIntersection(xPosition, yPosition) {
            const cells = document.querySelectorAll('.key-cell');
            for (let i = 0; i < cells.length; i++) {
                const boundingBox = cells[i].getBoundingClientRect();
                
                if (
                    xPosition >= boundingBox.left &&
                    xPosition <= boundingBox.right &&
                    yPosition >= boundingBox.top &&
                    yPosition <= boundingBox.bottom
                ) {
                    return cells[i];
                }
            }
            return null;
        }

        // MediaPipe Telemetry Processing Pipeline Data Interface
        function processTelemetryFrameHandler(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            let indexFingerTipDetected = null;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                telemetryStats.textContent = `SYSTEM: TRACKING DETECTED (${results.multiHandLandmarks.length} HAND)`;
                telemetryStats.style.color = "#22c55e";

                const handLandmarksMatrix = results.multiHandLandmarks[0];
                const indexFingerTipNode = handLandmarksMatrix[8]; // Index Finger Tip Point Mapped

                // ABSOLUTE MIRROR RECTIFICATION MATRIX:
                // Because the canvas layer is transformed via scaleX(-1), the pixel drawing engine mirrors itself.
                // To accurately determine layout collision bounds, we invert the raw X position coordinate stream.
                const absoluteMirroredXCoordinate = (1.0 - indexFingerTipNode.x) * canvasElement.width;
                const absoluteYCoordinate = indexFingerTipNode.y * canvasElement.height;

                indexFingerTipDetected = { x: absoluteMirroredXCoordinate, y: absoluteYCoordinate };

                // Render neon tracking pointer ring
                canvasCtx.beginPath();
                canvasCtx.arc(indexFingerTipNode.x * canvasElement.width, indexFingerTipNode.y * canvasElement.height, 10, 0, 2 * Math.PI);
                canvasCtx.fillStyle = '#0ea5e9';
                canvasCtx.fill();
                canvasCtx.lineWidth = 3;
                canvasCtx.strokeStyle = '#ffffff';
                canvasCtx.stroke();

                canvasCtx.beginPath();
                canvasCtx.arc(indexFingerTipNode.x * canvasElement.width, indexFingerTipNode.y * canvasElement.height, 20, 0, 2 * Math.PI);
                canvasCtx.lineWidth = 1.5;
                canvasCtx.strokeStyle = 'rgba(14, 165, 233, 0.4)';
                canvasCtx.stroke();
            } else {
                telemetryStats.textContent = "SYSTEM: SCANNING FOR HAND MATRIX...";
                telemetryStats.style.color = "#f59e0b";
            }

            // Dwell Collision Integration Checks
            if (indexFingerTipDetected && !systemCoolDownLockActive) {
                const activeIntersectedKeyElement = identifySpatialKeyIntersection(indexFingerTipDetected.x, indexFingerTipDetected.y);

                if (activeIntersectedKeyElement) {
                    if (currentTargetKeyElement === activeIntersectedKeyElement) {
                        const structuralElapsedTime = Date.now() - spatialHoverStartTime;
                        const structuralProgressRatio = Math.min((structuralElapsedTime / GESTURE_DWELL_THRESHOLD_MS) * 100, 100);
                        
                        activeIntersectedKeyElement.style.setProperty('--hover-progress', `${structuralProgressRatio}%`);

                        if (structuralElapsedTime >= GESTURE_DWELL_THRESHOLD_MS) {
                            const keyTargetValue = activeIntersectedKeyElement.getAttribute('data-key');
                            
                            activeIntersectedKeyElement.classList.remove('spatial-hover');
                            activeIntersectedKeyElement.classList.add('spatial-commit');
                            
                            updateDisplayBufferUI(keyTargetValue);
                            
                            systemCoolDownLockActive = true;
                            setTimeout(() => {
                                activeIntersectedKeyElement.classList.remove('spatial-commit');
                                systemCoolDownLockActive = false;
                                currentTargetKeyElement = null;
                            }, 400);
                        }
                    } else {
                        clearPrecedingHoverIntersections();
                        currentTargetKeyElement = activeIntersectedKeyElement;
                        spatialHoverStartTime = Date.now();
                        currentTargetKeyElement.classList.add('spatial-hover');
                    }
                } else {
                    clearPrecedingHoverIntersections();
                }
            } else if (!indexFingerTipDetected) {
                clearPrecedingHoverIntersections();
            }
        }

        function clearPrecedingHoverIntersections() {
            if (currentTargetKeyElement) {
                currentTargetKeyElement.classList.remove('spatial-hover');
                currentTargetKeyElement.style.setProperty('--hover-progress', '0%');
            }
            currentTargetKeyElement = null;
        }

        // Initialize MediaPipe Module Instances
        const handsComputationalModuleInstance = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        handsComputationalModuleInstance.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        handsComputationalModuleInstance.onResults(processTelemetryFrameHandler);

        // Engage native viewport video stream channels
        const cameraTelemetryStreamInstance = new Camera(videoElement, {
            onFrame: async () => {
                await handsComputationalModuleInstance.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });

        cameraTelemetryStreamInstance.start()
            .then(() => {
                telemetryStats.textContent = "SYSTEM: HARDWARE MODULE ONLINE";
                renderApplicationToast("FIZONYX విజన్ సిస్టమ్ ఆన్‌లైన్ లోకి వచ్చింది.");
            })
            .catch((hardwareFaultError) => {
                telemetryStats.textContent = "SYSTEM: HARDWARE ACQUISITION FAULT";
                telemetryStats.style.color = "#ef4444";
                renderApplicationToast("కెమెరా ఎర్రర్: " + hardwareFaultError.message, true);
            });

        // Event handler routing pipeline configuration
        submitButton.addEventListener('click', commitDataToCloudStore);

        // Async Database Stream Processing Layer Handshake Engine
        async function commitDataToCloudStore() {
            if (isBufferDefaultState || activeStringStream.trim() === "") {
                renderApplicationToast("సబ్మిట్ చేయడానికి డేటా ఖాళీగా ఉంది!", true);
                return;
            }

            submitButton.disabled = true;
            submitButton.textContent = "SYNCHRONIZING...";
            renderApplicationToast("Google Sheet లోకలికి డేటా అప్‌లోడ్ అవుతోంది...");

            try {
                const requestPayloadMatrix = {
                    typedText: activeStringStream
                };

                // Asynchronous data transport execution
                await fetch(SECURE_APPS_SCRIPT_WEBAPP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestPayloadMatrix)
                });

                renderApplicationToast("సక్సెస్! సమాచారం క్లౌడ్ షీట్ లో రికార్డ్ అయింది.");
                
                activeStringStream = "";
                displayBuffer.textContent = "ప్రస్తుతుం టైప్ చేసిన అక్షరాలు ఇక్కడ కనిపిస్తాయి...";
                isBufferDefaultState = true;

            } catch (networkFaultException) {
                console.error("Cloud Transaction Handshake Intercept Fault: ", networkFaultException);
                renderApplicationToast("నెట్‌వర్క్ కనెక్షన్ లోపం! మళ్ళీ ట్రై చేయండి.", true);
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = "SUBMIT DATA";
            }
        }
    </script>
</body>
</html>
